apiVersion: apps/v1
kind:  MYAPP
metadata:
  namespace: default
spec:
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
     labels:
      app: MYAPP
    spec:
      tolerations:
      # this toleration is to have the daemonset runnable on master nodes
      # remove it if your master node-role.kubernetes.io/master
        effect: NoSchedule
      containers:
      - name: MYAPP
        image: debian
        resources:
          limits:
            memory: 200Mi
          requests:
            cpu: 100m
            memory: 200Mi
        volumeMounts:
        - name: localtime
          mountPath: /etc/localtime
      terminationGracePeriodSeconds: 30
      volumes:
      - name: localtime
        hostPath:
          path: /usr/share/zoneinfo/Asia/Shanghai