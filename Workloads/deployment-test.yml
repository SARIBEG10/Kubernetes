apiVersion: v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: anisa
  labels:
    app: nginx
spec:
    selector:
      matchLabels:
        app: nginx
    replicas: 1
    template:
      metadata:
        labels:
          app: nginx
      spec:
         containers:
            - name: web
              image: nginx:1.14.2
              ports:
                - containerPort: 80
              resources:
                  requests:
                    cpu: 100m
                    memory: 100Mi
                  limits:
                    cpu: 100m
                    memory: 100Mi
            
              